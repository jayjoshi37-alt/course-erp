 {% extends 'instructor/instructor_base.html' %}

{% block content %}
<style>
.center-wrapper{
    width:100%;
    height:calc(100vh - 120px); /* header height adjust */
    display:flex;
    justify-content:center;
    align-items:center;
}

.change-box{
    max-width:400px;
    width:100%;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,.1);
}

.change-box h2{
    margin-bottom:20px;
    color:#1e1e2f;
    text-align:center;
}

.change-box input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

.change-box button{
    width:100%;
    padding:10px;
    background:#6a11cb;
    border:none;
    color:#fff;
    border-radius:6px;
    cursor:pointer;
}

.change-box button:hover{
    background:#5710a5;
}
</style>

<div class="center-wrapper">
    <div class="change-box">
        <h2>Change Password 🔐</h2>
        <form method="POST">
            <input type="password" name="old_password" placeholder="Old Password" required>
            <input type="password" name="new_password" placeholder="New Password" required>
            <input type="password" name="confirm_password" placeholder="Confirm New Password" required>
            <button type="submit">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}
