 {% extends 'instructor/instructor_base.html' %}

{% block content %}

<style>
.my-courses-title{
    font-size:26px;
    font-weight:600;
    margin-bottom:25px;
}
.course-grid {
    width: 90%;
    margin: 40px auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, 260px);
    gap: 24px;
    justify-content: center;   /* ⭐ KEY FIX */
}

.course-card {
    width: 260px;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #e5e7eb;
    transition: transform .25s ease, box-shadow .25s ease;
}
.course-card:hover{
    transform:translateY(-6px);
    box-shadow:0 14px 28px rgba(0,0,0,0.12);
}
.course-card img{
    width:100%;
    height:160px;
    object-fit:cover;
}
.course-content{
    padding:18px;
}
.course-content h3{
    font-size:18px;
    font-weight:600;
    margin-bottom:8px;
    color:#333;
}
.course-content p{
    font-size:16px;
    font-weight:600;
    color:#6a11cb;
    margin-bottom:14px;
}
.course-actions{
    display: flex;
    flex-wrap: wrap;        /* ⭐ IMPORTANT */
    gap: 8px;
}

.course-actions a{
    text-decoration:none;
    padding:8px 14px;
    border-radius:8px;
    font-size:14px;
    font-weight:600;
    transition:0.3s;
}
.card-buttons {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}
.edit-btn{
    background:#2575fc;
    color:#fff;
}
.edit-btn:hover{
    background:#1e5ed8;
}
.delete-btn{
    background:#ff6b6b;
    color:#fff;
}
.delete-btn:hover{
    background:#e84545;
}
.video-btn{
    background: linear-gradient(90deg, #16a34a 0%, #22c55e 100%);
    color: #fff;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 8px;
    text-decoration: none;
    transition: all 0.3s ease;
}

.video-btn:hover{
    background: linear-gradient(90deg, #22c55e 0%, #16a34a 100%);
    transform: translateY(-2px);
    box-shadow: 0 6px 10px rgba(0,0,0,0.15);
}

.quiz-btn{
    background:#7c3aed;
    color:#fff;
}
.quiz-btn:hover{
    background:#5b21b6;
}

.manage-quiz-btn{
    width:100%;
    text-align:center;
    background:#f59e0b;
    color:#fff;
    padding:10px;
    border-radius:8px;
    font-weight:600;
    text-decoration:none;
}
.manage-quiz-btn:hover{
    background:#d97706;
}



</style>

 <center><h2 class="my-courses-title">My Courses</h2></center>

<div class="course-grid">
{% for c in courses %}

    <div class="course-card">

        <img src="{{ url_for('static', filename='uploads/' + c[4]) }}">

        <div class="course-content">
            <h3>{{ c[1] }}</h3>
            <p>₹ {{ c[3] }}</p>

            <div class="course-actions">
                <a href="{{ url_for('edit_course', id=c[0]) }}" class="edit-btn">Edit</a>
                <a href="{{ url_for('instructor_delete_course', id=c[0]) }}"
                   class="delete-btn"
                   onclick="return confirm('Delete course?')">
                   Delete
                </a>
                 <a href="{{ url_for('upload_video', course_id=c[0]) }}" class="video-btn">
                    Video
                 </a>

                <!-- ✅ FIXED CREATE QUIZ -->
                <a href="{{ url_for('create_quiz', course_id=c[0]) }}"
                   class="quiz-btn">
                   Quiz
                </a>

                <div class="card-buttons">
                <a href="{{ url_for('instructor_quiz_list', course_id=c[0]) }}"
                class="manage-quiz-btn">
                  Manage Quizzes
                </a>
                </div>




            </div>
        </div>
    </div>
{% endfor %}
</div>

{% endblock %}
