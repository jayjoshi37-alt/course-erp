{% extends 'base.html' %}
{% block content %}

<style>
/* ===== Full Page Container ===== */
.content-area {
    width: 100%;
    height: calc(100vh - 120px);
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* ===== Forgot Box ===== */
.forgot-container {
    width: 360px;
    background: #fff;
    padding: 40px 30px;
    border-radius: 12px;
    box-shadow: 0 12px 25px rgba(0, 0, 0, 0.15);
    text-align: center;
}

/* ===== Heading ===== */
.forgot-container h2 {
    margin-bottom: 20px;
    font-size: 26px;
    color: #333;
    font-weight: 700;
}

/* ===== Description ===== */
.forgot-container p {
    font-size: 14px;
    color: #555;
    margin-bottom: 20px;
}

/* ===== Input ===== */
.forgot-container input {
    width: 100%;
    padding: 12px 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 16px;
}

.forgot-container input:focus {
    border-color: #6a11cb;
    outline: none;
}

/* ===== Button ===== */
.forgot-container button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: #6a11cb;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
}

.forgot-container button:hover {
    background: #2575fc;
}

/* ===== Back to Login ===== */
.back-link {
    margin-top: 15px;
    font-size: 14px;
}

.back-link a {
    color: #6a11cb;
    text-decoration: none;
    font-weight: 500;
}

.back-link a:hover {
    color: #2575fc;
}

/* ===== Responsive ===== */
@media screen and (max-width: 480px) {
    .forgot-container {
        width: 90%;
        padding: 30px 20px;
    }

    .forgot-container h2 {
        font-size: 22px;
    }
}
</style>

<div class="content-area">
    <div class="forgot-container">

        <h2>Forgot Password</h2>
        <p>Enter your registered email address to receive your password.</p>

        <form method="POST">
            <input type="email" name="email" placeholder="Enter Registered Email" required>
            <button type="submit">Send Password</button>
        </form>

        <div class="back-link">
            <a href="{{ url_for('instructor_login') }}">← Back to Login</a>
        </div>

    </div>
</div>

{% endblock %}
