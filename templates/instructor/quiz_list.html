{% extends 'instructor/instructor_base.html' %}
{% block content %}

<style>
/* Page container */
.quiz-page {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
}

/* Header */
.quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}
.quiz-header h3 {
    font-size: 26px;
    font-weight: 600;
    color: #1f2937;
}

/* Create button */
.create-quiz-btn {
    background: linear-gradient(90deg, #16a34a, #22c55e);
    color: #fff;
    padding: 10px 18px;
    border-radius: 10px;
    font-weight: 600;
    text-decoration: none;
    transition: 0.3s;
}
.create-quiz-btn:hover {
    background: linear-gradient(90deg, #22c55e, #16a34a);
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.15);
}

/* Quiz card */
.quiz-card {
    background: #ffffff;
    padding: 22px;
    border-radius: 14px;
    margin-bottom: 18px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Quiz info */
.quiz-info h4 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #111827;
}
.quiz-info p {
    font-size: 14px;
    font-weight: 600;
    color: #6b7280;
}

/* Actions */
.quiz-actions a {
    background: #2563eb;
    color: #fff;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: 0.3s;
}
.quiz-actions a:hover {
    background: #1e40af;
}

/* Empty state */
.no-quiz {
    background: #f9fafb;
    border: 2px dashed #d1d5db;
    padding: 40px;
    border-radius: 14px;
    text-align: center;
    font-weight: 600;
    color: #6b7280;
}

.delete-quiz-btn{
    background:#ef4444;
    color:#fff;
    padding:8px 16px;
    border-radius:8px;
    font-size:14px;
    font-weight:600;
    text-decoration:none;
    transition:.3s;
    margin-left:8px;
}
.delete-quiz-btn:hover{
    background:#dc2626;
}

</style>

<div class="quiz-page">

    <div class="quiz-header">
        <h3>Course Quizzes</h3>
        <a href="{{ url_for('create_quiz', course_id=course_id) }}"
           class="create-quiz-btn">
           + Create Quiz
        </a>
    </div>

    {% for q in quizzes %}
        <div class="quiz-card">
            <div class="quiz-info">
                <h4>{{ q[1] }}</h4>
                <p>Pass Percentage: {{ q[2] }}%</p>
            </div>

            <div class="quiz-actions">
                <a href="{{ url_for('edit_quiz', quiz_id=q[0]) }}">
                    Edit Quiz
                </a>
                 <a href="{{ url_for('delete_quiz', quiz_id=q[0]) }}"
       class="delete-quiz-btn"
       onclick="return confirm('Are you sure you want to delete this quiz?')">
        Delete
    </a>
            </div>
        </div>
    {% else %}
        <div class="no-quiz">
            No quizzes created yet.
        </div>
    {% endfor %}

</div>

{% endblock %}
