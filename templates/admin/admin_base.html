 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Institute ERP</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #f7f9fa;
        }

        /* ================= HEADER ================= */
        .colorful-header {
            height: 60px;
            background: linear-gradient(90deg, #6a11cb, #ff6a00);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            color: white;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
        }

        .logout-btn {
            background: #111;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
        }

        /* ================= LAYOUT ================= */
        .admin-layout {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* ================= SIDEBAR ================= */
        .sidebar {
            width: 250px;
            background: #1c1d1f;
            padding: 20px;
            color: #ffffff;
        }

        /* Admin Panel Heading FIX */
        .sidebar h2 {
            color: #ffffff;
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar h2 i {
            color: #ffb703;
            font-size: 20px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            color: #d1d7dc;
            text-decoration: none;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 15px;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #2d2f31;
            color: #ffffff;
        }

        /* ================= CONTENT ================= */
        .page-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="colorful-header">
    <div class="logo">Institute ERP</div>
    <a href="{{ url_for('admin_logout') }}">
        <button class="logout-btn">Logout</button>
    </a>
</header>

<!-- BODY -->
<div class="admin-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <h2>
            <i class="fa-solid fa-user-shield"></i> Admin Panel
        </h2>

        <a href="{{ url_for('admin_dashboard') }}">
            <i class="fa-solid fa-chart-line"></i> Dashboard
        </a>

        <a href="{{ url_for('history') }}">
            <i class="fa-solid fa-users"></i> User History
        </a>

        <a href="#">
            <i class="fa-solid fa-book"></i> Courses
        </a>

        <a href="#">
            <i class="fa-solid fa-chalkboard-user"></i> Instructors
        </a>

        <a href="{{ url_for('admin_reviews') }}">
            <i class="fa-solid fa-star"></i> Reviews
        </a>

        <a href="{{ url_for('admin_logout') }}">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>

    </aside>

    <!-- MAIN CONTENT -->
    <main class="page-content">
        {% block content %}{% endblock %}
    </main>

</div>

</body>
</html>
