 {% extends 'user/user_base.html' %}
{% block content %}

<style>
/* ================= PAGE WRAPPER ================= */
.review-page {
    min-height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f4f6f8;
    padding: 20px;
}

/* ================= REVIEW CARD ================= */
.review-box {
    width: 100%;
    max-width: 460px;
    background: #ffffff;
    padding: 30px;
    border-radius: 14px;
    box-shadow: 0 18px 35px rgba(0,0,0,0.12);
}

/* ================= TITLE ================= */
.review-box h2 {
    text-align: center;
    font-size: 24px;
    margin-bottom: 25px;
    color: #111827;
}

/* ================= FORM ================= */
.review-box label {
    font-weight: 600;
    margin-top: 15px;
    display: block;
    color: #374151;
}

.review-box select,
.review-box textarea {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    font-size: 14px;
    outline: none;
    transition: border 0.3s;
}

.review-box select:focus,
.review-box textarea:focus {
    border-color: #6366f1;
}

/* ================= BUTTON ================= */
.review-box button {
    width: 100%;
    margin-top: 22px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #16a34a 0%, #22c55e 100%);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
}

.review-box button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 18px rgba(0,0,0,0.2);
}

/* ================= MOBILE ================= */
@media (max-width: 480px) {
    .review-box {
        padding: 22px;
    }
}
</style>

<div class="review-page">
    <div class="review-box">
        <h2>Leave a Review ⭐</h2>

        <form method="POST">
            <label>Rating</label>
            <select name="rating" required>
                <option value="">Select Rating</option>
                <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
                <option value="4">⭐⭐⭐⭐ Very Good</option>
                <option value="3">⭐⭐⭐ Good</option>
                <option value="2">⭐⭐ Fair</option>
                <option value="1">⭐ Poor</option>
            </select>

            <label>Review</label>
            <textarea name="review" rows="4"
                      placeholder="Share your experience..." required></textarea>

            <button type="submit">Submit Review</button>
        </form>
    </div>
</div>

{% endblock %}
