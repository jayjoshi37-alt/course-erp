{% extends 'base.html' %}
{% block content %}
<style>
/* ---------- AUTH PAGE COMMON STYLING ---------- */
.auth-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
    font-family: 'Poppins', sans-serif;
}

.card {
    width: 360px;
    background: #fff;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    text-align: center;
}

/* ---------- HEADING ---------- */
.card h2 {
    color: #5a36f0;
    font-weight: 600;
    margin-bottom: 20px;
}

/* ---------- INPUT ---------- */
.card input {
    width: 100%;
    padding: 12px;
    margin: 12px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 15px;
    transition: 0.3s;
}

.card input:focus {
    border-color: #5a36f0;
    outline: none;
    box-shadow: 0 0 6px rgba(90, 54, 240, 0.3);
}

/* ---------- BUTTON ---------- */
.card button {
    width: 100%;
    padding: 12px;
    border: none;
    background: #5a36f0;
    color: #fff;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    margin-top: 10px;
    transition: 0.3s;
}

.card button:hover {
    background: #4828d6;
}

/* ---------- LINKS ---------- */
.card p {
    margin-top: 15px;
    font-size: 14px;
}

.card a {
    color: #5a36f0;
    text-decoration: none;
    font-weight: 600;
}

.card a:hover {
    text-decoration: underline;
}

/* ---------- FLASH MESSAGES ---------- */
.success {
    background: #d4edda;
    color: #155724;
    padding: 10px;
    border-left: 4px solid #28a745;
    border-radius: 6px;
    margin-bottom: 10px;
}

.danger {
    background: #f8d7da;
    color: #721c24;
    padding: 10px;
    border-left: 4px solid #dc3545;
    border-radius: 6px;
    margin-bottom: 10px;
}
</style>

<div class="auth-container">
    <div class="card">
        <h2>Forgot Password</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form method="POST">
            <input type="email" name="email" placeholder="Enter your registered email" required>
            <button type="submit">Send Password</button>
        </form>

        <p>Remembered your password?
            <a href="{{ url_for('login') }}">Login</a>
        </p>
    </div>
</div>

{% endblock %}
