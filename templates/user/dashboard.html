 {% extends 'user/user_base.html' %}

{% block content %}
<style>

/* Cards */
.dashboard-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.dashboard-card {
    background: #fff;
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0 4px 14px rgba(0,0,0,.08);
    text-align: center;
    transition: transform .25s ease;
}

.dashboard-card:hover {
    transform: translateY(-5px);
}

.dashboard-card i {
    font-size: 36px;
    margin-bottom: 10px;
}

/* Colors */
.enrolled i { color: #2563eb; }
.completed i { color: #16a34a; }
.progress i { color: #f59e0b; }
.certificates i { color: #9333ea; }

/* Grid Container */
.course-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 24px;
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
}

/* Individual Course Card */
.course-card {
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #e5e7eb;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.course-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 14px 28px rgba(0,0,0,0.12);
}

/* Course Image */
.course-card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
}
.course-card {
    width: 260px;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #e5e7eb;
    transition: transform .25s ease, box-shadow .25s ease;
}
/* Course Content */
.course-content {
    padding: 16px;
    text-align: center;
}

.course-content h3 {
    font-size: 18px;
    font-weight: 600;
    color: #333;
    margin-bottom: 8px;
}

.course-content p {
    font-size: 16px;
    font-weight: 600;
    color: #6a11cb; /* Purple for price */
    margin-bottom: 12px;
}

/* Button */
.video-btn {
    display: inline-block;
    background: linear-gradient(90deg, #16a34a 0%, #22c55e 100%);
    color: #fff;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 8px;
    text-decoration: none;
    transition: all 0.3s ease;
}

.video-btn:hover {
    background: linear-gradient(90deg, #22c55e 0%, #16a34a 100%);
    transform: translateY(-2px);
    box-shadow: 0 6px 10px rgba(0,0,0,0.15);
}

/* Responsive Design */
@media screen and (max-width: 768px) {
    .course-grid {
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
    }
}

</style>
<h1 class="dashboard-title">
    Welcome, {{ user }} 👋
</h1>
 &nbsp;
<!-- Dashboard Cards -->
        <div class="dashboard-cards">

            <div class="dashboard-card enrolled">
                <i class="fa-solid fa-book-open-reader"></i>
                <h3>5</h3>
                <p>Enrolled Courses</p>
            </div>

            <div class="dashboard-card completed">
                <i class="fa-solid fa-circle-check"></i>
                <h3>2</h3>
                <p>Completed</p>
            </div>

            <div class="dashboard-card progress">
                <i class="fa-solid fa-chart-line"></i>
                <h3>60%</h3>
                <p>Progress</p>
            </div>

            <div class="dashboard-card certificates">
                <i class="fa-solid fa-certificate"></i>
                <h3>1</h3>
                <p>Certificates</p>
            </div>

        </div>
 &nbsp;&nbsp;
<h2 style="text-align:center;margin-bottom:20px;">Available Courses</h2>

<div class="course-grid">
{% for c in courses %}
    <div class="course-card">
        <img src="{{ url_for('static', filename='uploads/' + c[4]) }}">

        <div class="course-content">
            <h3>{{ c[1] }}</h3>
            <p>₹ {{ c[3] }}</p>

            <div class="course-actions">
                <a href="{{ url_for('course_detail', course_id=c[0]) }}" class="video-btn">
    Browse Course
</a>
            </div>
        </div>
    </div>
{% endfor %}
</div>





{% endblock %}
