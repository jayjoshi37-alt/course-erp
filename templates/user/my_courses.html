{% extends 'user/user_base.html' %}
{% block content %}

<style>
.mycourses-wrapper{
    max-width:1100px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
}

.course-card{
    background:#fff;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 12px 30px rgba(0,0,0,.15);
    transition:.3s;
}
.course-card {
    width: 260px;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #e5e7eb;
    transition: transform .25s ease, box-shadow .25s ease;
}
.course-card:hover{
    transform:translateY(-6px);
}

.course-card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.course-body{
    padding:18px;
}

.course-body h3{
    margin-bottom:10px;
    font-size:18px;
}

/* ===== PROGRESS BAR ===== */
.progress{
    height:18px;
    border-radius:20px;
    background:#e5e7eb;
    overflow:hidden;
    margin-bottom:12px;
}

.progress-bar{
    height:100%;
    background:linear-gradient(90deg,#22c55e,#16a34a);
    font-size:12px;
    font-weight:600;
    color:#fff;
    text-align:center;
    line-height:18px;
    transition:width .6s ease;
}

/* ===== BUTTON ===== */
.open-btn{
    display:inline-block;
    padding:10px 20px;
    border-radius:8px;
    background:#6a11cb;
    color:#fff;
    text-decoration:none;
    font-weight:600;
}

.open-btn:hover{
    background:#5b0fbf;
}
</style>

<h2 style="margin-bottom:25px;">📚 My Courses</h2>

{% if courses %}
<div class="mycourses-wrapper">

    {% for course in courses %}
    <div class="course-card">

        <img src="{{ url_for('static', filename='uploads/' ~ course[2]) }}" alt="course">

        <div class="course-body">

            <h3>{{ course[1] }}</h3>

            <!-- COURSE PROGRESS -->
            <div class="progress">
                <div class="progress-bar" style="width: {{ course[3] }}%;">
                    {{ course[3] }}%
                </div>
            </div>

            <!-- BUTTON -->
            <a href="{{ url_for('course_videos', course_id=course[0]) }}"
               class="open-btn">
               ▶ Continue Learning
            </a>

        </div>
    </div>
    {% endfor %}

</div>
{% else %}
<p>No courses enrolled yet.</p>
{% endif %}

{% endblock %}
