{% extends 'user/user_base.html' %}
{% block content %}

<style>
        body{
            font-family:Segoe UI, sans-serif;
            background:#f3f4f6;
            margin:0;
        }
        .container{
            max-width:500px;
            margin:80px auto;
            background:#fff;
            padding:40px;
            border-radius:14px;
            text-align:center;
            box-shadow:0 12px 30px rgba(0,0,0,.15);
        }
        h2{
            font-size:28px;
            margin-bottom:20px;
        }
        .score{
            font-size:36px;
            font-weight:700;
            margin:20px 0;
        }
        .pass{
            color:#16a34a;
            font-size:22px;
        }
        .fail{
            color:#dc2626;
            font-size:22px;
        }
        .back-btn{
    display: inline-block;
    margin-top: 25px;
    padding: 12px 28px;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    color: #ffffff;
    text-decoration: none;
    font-size: 16px;
    font-weight: 600;
    border-radius: 30px;
    transition: all 0.3s ease;
    box-shadow: 0 8px 20px rgba(124, 58, 237, 0.35);
}

.back-btn:hover{
    transform: translateY(-2px);
    box-shadow: 0 12px 28px rgba(236, 72, 153, 0.45);
    background: linear-gradient(135deg, #6d28d9, #db2777);
}

.back-btn:active{
    transform: scale(0.97);
}
.btn{
    display: inline-block;
    margin-top: 20px;
    padding: 12px 30px;
    background: linear-gradient(135deg, #16a34a, #22c55e);
    color: #ffffff;
    text-decoration: none;
    font-size: 16px;
    font-weight: 600;
    border-radius: 30px;
    transition: all 0.3s ease;
    box-shadow: 0 8px 20px rgba(34, 197, 94, 0.35);
}

.btn:hover{
    transform: translateY(-2px);
    background: linear-gradient(135deg, #15803d, #16a34a);
    box-shadow: 0 12px 28px rgba(22, 163, 74, 0.45);
}

.btn:active{
    transform: scale(0.96);
}


    </style>
</head>
<body>

<div class="container">
    <h2>Quiz Result</h2>

    <div class="score">{{ result[0] }}%</div>

    {% if result[1] %}
        <div class="pass">🎉 Congratulations! You Passed</div>
    <a href="{{ url_for('my_certificates') }}" class="btn">Download Certificate</a>
    {% else %}
        <div class="fail">❌ Sorry! You Failed</div>
    {% endif %}

     <a href="/user/my_courses" class="back-btn">Back to My Courses</a>
</div>

{% endblock %}
