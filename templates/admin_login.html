{% extends 'base.html' %}

{% block content %}
<style>
    <style>
.login-page{
    min-height: 100vh;
    background: linear-gradient(135deg,#6a11cb,#2575fc);
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Login Box */
.login-box{
    background: #fff;
    padding: 40px 35px;
    width: 380px;
    border-radius: 16px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}

/* Title */
.login-box h2{
    text-align: center;
    margin-bottom: 30px;
    font-size: 26px;
    font-weight: 700;
    color: #333;
}

/* Input Box */
.user-box{
    position: relative;
    margin-bottom: 25px;
}

.user-box input{
    width: 100%;
    padding: 12px 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
    font-size: 15px;
}

.user-box label{
    position: absolute;
    top: 50%;
    left: 12px;
    color: #999;
    font-size: 14px;
    transform: translateY(-50%);
    pointer-events: none;
    transition: 0.3s;
    background: #fff;
    padding: 0 6px;
}

/* Floating Label */
.user-box input:focus + label,
.user-box input:valid + label{
    top: -8px;
    font-size: 12px;
    color: #6a11cb;
}

/* Button */
.btn{
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg,#6a11cb,#2575fc);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover{
    opacity: 0.9;
    transform: translateY(-1px);
}

/* Mobile */
@media(max-width:480px){
    .login-box{
        width: 90%;
        padding: 30px 25px;
    }
}
.login-page{
    min-height: 100vh;
    display: flex;
    align-items: center;      /* vertical center */
    justify-content: center;  /* horizontal center */
    background: linear-gradient(135deg,#6a11cb,#2575fc);
}

.login-box{
    width: 380px;
    background: #fff;
    padding: 40px 35px;
    border-radius: 16px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}

</style>
</style>
<div class="login-page">
    <div class="login-box">
        <h2>Admin Login</h2>

        <form method="POST" action="{{ url_for('admin_login') }}">

            <div class="user-box">
                <input type="text" name="username" required>
                <label>Username</label>
            </div>

            <div class="user-box">
                <input type="password" name="password" required>
                <label>Password</label>
            </div>

            <button class="btn" type="submit">
                Login
            </button>

        </form>
    </div>
</div>

{% endblock %}
