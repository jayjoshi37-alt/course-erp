{% extends 'base.html' %}
{% block content %}

<style>
 /* ===== Full Page Container ===== */
.register-wrapper {
    width: 100%;
    height: calc(100vh - 120px); /* Adjust according to header/footer */
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* ===== Register Box ===== */
.register-box {
    width: 380px;
    background: #fff;
    padding: 40px 30px;
    border-radius: 12px;
    box-shadow: 0 12px 25px rgba(0, 0, 0, 0.15);
    text-align: center;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.register-box:hover {
    transform: translateY(-5px);
    box-shadow: 0 18px 35px rgba(0, 0, 0, 0.2);
}

/* ===== Heading ===== */
.register-box h2 {
    margin-bottom: 25px;
    font-size: 26px;
    color: #333;
    font-weight: 700;
}

/* ===== Flash Messages ===== */
.register-box p {
    margin-bottom: 12px;
    font-size: 14px;
    color: green; /* default success color */
}

/* ===== Input Fields ===== */
.register-box input {
    width: 100%;
    padding: 12px 15px;
    margin-top: 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 16px;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
}

.register-box input:focus {
    border-color: #6a11cb;
    box-shadow: 0 0 5px rgba(106, 17, 203, 0.5);
    outline: none;
}

/* ===== Register Button ===== */
.register-box button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: #6a11cb;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.3s ease, transform 0.2s ease;
}

.register-box button:hover {
    background: #2575fc;
    transform: translateY(-2px);
}

/* ===== Login Link ===== */
.register-box .login-link {
    margin-top: 15px;
    font-size: 14px;
    color: #555;
}

.register-box .login-link a {
    color: #6a11cb;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.3s ease;
}

.register-box .login-link a:hover {
    color: #2575fc;
}

/* ===== Responsive ===== */
@media screen and

</style>

<div class="register-wrapper">
    <div class="register-box">
        <h2>Instructor Register</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <p style="color:green;">{{ message }}</p>
          {% endfor %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>

        <p class="login-link">
            Already registered?
            <a href="{{ url_for('instructor_login') }}">Login</a>
        </p>
    </div>
</div>

{% endblock %}
